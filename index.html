<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Grid Websites</title>
    <style>
        /* Reset margins so the grid takes up the whole screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #f0f0f0;
        }

        /* Create a 2x2 grid using CSS Grid */
        .grid-container {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 50% 50%;
            height: 100vh; /* 100% of the viewport height */
            width: 100vw;  /* 100% of the viewport width */
        }

        /* Style the iframes to fill their grid cells perfectly */
        iframe {
            width: 100%;
            height: 100%;
            border: 2px solid black; /* Optional: adds a border between sites */
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <iframe src="https://en.wikipedia.org/wiki/Main_Page"></iframe>
        <iframe src="https://attendancesdy.sugidigital.org/dashboard/page1></iframe>
        <iframe src="https://l2sdygrafana.sugidigital.org/d/fe9tzft54x1xcf/line-2-sendayan-oee-dashboard?orgId=1&from=now-5m&to=now&timezone=browser&refresh=5s&tab=transformations"></iframe>
        <iframe src="https://www.w3.org/"></iframe>
    </div>

</body>
</html>
