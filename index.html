<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Grid Layout</title>
    <style>
        /* Reset margins to take up the full screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
        }

        /* Create the 3-column grid */
        .grid-container {
            display: grid;
            /* '1fr' means 1 fraction. Doing it 3 times creates 3 equal columns */
            grid-template-columns: 1fr 1fr 1fr; 
            height: 100vh; /* Full screen height */
        }

        /* Style the text boxes inside the grid */
        .grid-item {
            display: flex;
            align-items: center; /* Centers text vertically */
            justify-content: center; /* Centers text horizontally */
            text-align: center;
            border: 2px solid #333;
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Give each box a different background color */
        .box1 { background-color: #ffcccc; } /* Light Red */
        .box2 { background-color: #ccffcc; } /* Light Green */
        .box3 { background-color: #ccccff; } /* Light Blue */
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="grid-item box1">
            This is Grid 1<br><br>
            You can put text, images, or a website here!
        </div>
        <div class="grid-item box2">
            This is Grid 2<br><br>
            Just writing something here as requested.
        </div>
        <div class="grid-item box3">
            This is Grid 3<br><br>
            Hello from the third box!
        </div>
    </div>

</body>
</html>
